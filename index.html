<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Modern Price Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .input-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold gradient-text">Kalkulator Akun MLBB</h1>
            <p class="text-slate-400 mt-2">Versi Update: Legend, Exquisite, Deluxe, Exceptional</p>
        </header>

        <div class="input-card p-6 rounded-2xl shadow-2xl space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4">
                    <h3 class="text-blue-400 font-bold border-b border-blue-900 pb-1">Tier Sultan</h3>
                    <div>
                        <label class="text-xs uppercase tracking-wider text-slate-500">Skin Legend</label>
                        <input type="number" id="skinLegend" class="w-full bg-slate-800 p-3 rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-wider text-slate-500">Skin Grand (Collector/Event)</label>
                        <input type="number" id="skinGrand" class="w-full bg-slate-800 p-3 rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0">
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-purple-400 font-bold border-b border-purple-900 pb-1">Tier Reguler</h3>
                    <div>
                        <label class="text-xs uppercase tracking-wider text-slate-500">Skin Exquisite (High Quality)</label>
                        <input type="number" id="skinExquisite" class="w-full bg-slate-800 p-3 rounded-lg mt-1 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-wider text-slate-500">Skin Deluxe (Mid Quality)</label>
                        <input type="number" id="skinDeluxe" class="w-full bg-slate-800 p-3 rounded-lg mt-1 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="0">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs uppercase tracking-wider text-slate-500">Exceptional (Standard)</label>
                    <input type="number" id="skinExceptional" class="w-full bg-slate-800 p-3 rounded-lg mt-1 outline-none" placeholder="0">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-wider text-slate-500">Common Skins</label>
                    <input type="number" id="skinCommon" class="w-full bg-slate-800 p-3 rounded-lg mt-1 outline-none" placeholder="0">
                </div>
            </div>

            <hr class="border-slate-700">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs uppercase tracking-wider text-slate-500">Kualitas Login</label>
                    <select id="loginType" class="w-full bg-slate-800 p-3 rounded-lg mt-1 outline-none">
                        <option value="1.0">Monsep (Data Polos)</option>
                        <option value="0.75">Monsep (Minus Data)</option>
                        <option value="0.40">Log Pancingan/Nabrak</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs uppercase tracking-wider text-slate-500">Win Rate Total (%)</label>
                    <input type="number" id="wr" class="w-full bg-slate-800 p-3 rounded-lg mt-1 outline-none" placeholder="Contoh: 60">
                </div>
            </div>

            <button onclick="calculate()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 transform hover:scale-[1.02]">
                CEK HARGA SEKARANG
            </button>
        </div>

        <div id="resultBox" class="hidden mt-8 p-8 rounded-2xl bg-white text-slate-900 text-center shadow-2xl">
            <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">Estimasi Harga Pasar</p>
            <h2 id="finalPrice" class="text-5xl font-black my-2 text-blue-700">Rp 0</h2>
            <p id="description" class="text-slate-600 text-sm italic"></p>
            
            <div class="mt-6 flex gap-2 justify-center">
                <button onclick="location.reload()" class="px-4 py-2 bg-slate-200 rounded-lg text-xs font-bold">RESET</button>
                <button onclick="window.print()" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold">SIMPAN HASIL</button>
            </div>
        </div>

        <footer class="mt-10 text-center text-slate-500 text-xs">
            <p>&copy; 2026 MLBB Calculator - Powered by Rahmattulah</p>
        </footer>
    </div>

    <script>
        function calculate() {
            // Estimasi Harga Satuan Berdasarkan Tier Terbaru
            const P_LEGEND = 300000;      // Legend
            const P_GRAND = 180000;       // Collector/Limited/Grand
            const P_EXQUISITE = 60000;    // Dulu setara Epic Limited/V.E.N.O.M
            const P_DELUXE = 25000;       // Dulu setara Special/Summer
            const P_EXCEPTIONAL = 10000;  // Dulu setara Elite
            const P_COMMON = 1500;        // Skin Normal/Common

            // Ambil Input
            let legend = (document.getElementById('skinLegend').value || 0) * P_LEGEND;
            let grand = (document.getElementById('skinGrand').value || 0) * P_GRAND;
            let exquisite = (document.getElementById('skinExquisite').value || 0) * P_EXQUISITE;
            let deluxe = (document.getElementById('skinDeluxe').value || 0) * P_DELUXE;
            let exceptional = (document.getElementById('skinExceptional').value || 0) * P_EXCEPTIONAL;
            let common = (document.getElementById('skinCommon').value || 0) * P_COMMON;

            let wr = parseFloat(document.getElementById('wr').value || 0);
            let loginMult = parseFloat(document.getElementById('loginType').value);

            // Perhitungan Total
            let total = legend + grand + exquisite + deluxe + exceptional + common;

            // Bonus WinRate (Akun High Mechanic)
            if (wr >= 70) total += 250000;
            else if (wr >= 60) total += 100000;

            // Pengali Login (Faktor Keamanan)
            total = total * loginMult;

            // Minimal harga jika ada skin tapi terlalu murah
            if (total > 0 && total < 20000) total = 25000;

            // Tampilkan
            const formatted = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(total);

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('finalPrice').innerText = formatted;
            
            let desc = "";
            if (loginMult < 1) desc = "Harga terpotong karena faktor keamanan login (tidak monsep polos).";
            else desc = "Harga dihitung berdasarkan standar akun Monsep Polos (Aman).";
            
            document.getElementById('description').innerText = desc;
            
            // Scroll ke hasil
            document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
