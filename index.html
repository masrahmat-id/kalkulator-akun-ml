<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Account Calc - Emblem Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .input-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold gradient-text tracking-tight uppercase">MLBB Pricing Engine</h1>
            <p class="text-slate-400 mt-2 font-medium">Kalkulator Detil Skin & Emblem &bull; Versi 2026</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 input-card p-6 rounded-3xl shadow-2xl space-y-6">
                <h3 class="text-lg font-bold border-b border-slate-700 pb-3 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> Detail Skin & Aset
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-sm">
                    <div>
                        <label class="font-bold text-blue-400">Skin Legend</label>
                        <input type="number" id="inLegend" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="font-bold text-yellow-500">Skin Grand (Collector)</label>
                        <input type="number" id="inGrand" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-yellow-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="font-bold text-purple-400">Skin Exquisite</label>
                        <input type="number" id="inExquisite" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="font-bold text-pink-400">Skin Deluxe</label>
                        <input type="number" id="inDeluxe" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-pink-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="font-bold text-green-400">Skin Exceptional</label>
                        <input type="number" id="inExceptional" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="font-bold text-slate-400">Skin Common</label>
                        <input type="number" id="inCommon" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 outline-none transition" placeholder="0">
                    </div>
                </div>

                <h3 class="text-lg font-bold border-b border-slate-700 pb-3 pt-4 flex items-center gap-2">
                    <span class="w-2 h-6 bg-orange-500 rounded-full"></span> Status Emblem & Akun
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-sm">
                    <div>
                        <label class="font-bold text-orange-400">Kondisi Emblem</label>
                        <select id="emblemStatus" class="w-full bg-slate-900 p-3 rounded-xl mt-1 border border-slate-700 outline-none cursor-pointer">
                            <option value="150000">Semua Max (All Max)</option>
                            <option value="50000">Hanya Emblem Utama Max</option>
                            <option value="0">Masih Level Rendah</option>
                        </select>
                    </div>
                    <div>
                        <label class="font-bold text-slate-400 uppercase">Keamanan Login</label>
                        <select id="loginType" class="w-full bg-slate-900 p-3 rounded-xl mt-1 border border-slate-700 outline-none cursor-pointer">
                            <option value="1.0">Monsep Polos (Bersih)</option>
                            <option value="0.75">Monsep (Ada Minus)</option>
                            <option value="0.40">Log Pancingan/Nabrak</option>
                        </select>
                    </div>
                    <div>
                        <label class="font-bold text-slate-400 uppercase">Win Rate (%)</label>
                        <input type="number" id="wr" class="w-full bg-slate-900 p-3 rounded-xl mt-1 border border-slate-700 outline-none transition" placeholder="60">
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-extrabold py-4 rounded-2xl shadow-xl transition-all active:scale-95">
                    HITUNG RINCIAN HARGA
                </button>
            </div>

            <div id="resultBox" class="lg:col-span-5 hidden space-y-4">
                <div class="bg-white rounded-3xl p-6 text-slate-900 shadow-2xl border-t-[10px] border-indigo-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Estimasi Final</p>
                    <h2 id="finalPrice" class="text-5xl font-black text-indigo-800 my-1">Rp 0</h2>
                    <p id="descStatus" class="text-[10px] font-bold text-white bg-indigo-600 px-3 py-1 rounded-full inline-block mt-2 uppercase"></p>
                </div>

                <div class="input-card rounded-3xl p-6 border border-slate-700">
                    <h3 class="text-xs font-black text-slate-400 mb-5 uppercase tracking-[0.2em] border-b border-slate-700 pb-2">Rincian Kalkulasi</h3>
                    
                    <div id="invoiceContent" class="space-y-4">
                        </div>

                    <div id="bonusSection" class="mt-4 pt-4 border-t border-slate-700 space-y-3">
                        </div>

                    <div id="taxSection" class="mt-4 p-3 bg-red-900/10 rounded-xl text-red-400 text-[11px] font-bold hidden">
                        </div>
                </div>

                <button onclick="window.print()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl text-[10px] font-black tracking-widest transition uppercase">Simpan Detail ke PDF</button>
            </div>
        </div>

        <footer class="mt-16 text-center text-[10px] text-slate-600 uppercase font-bold tracking-widest">
            &copy; 2026 Build by Rahmattulah &bull; Bondowoso Dev
        </footer>
    </div>

    <script>
        function calculate() {
            const PRICES = {
                legend: 350000,
                grand: 200000,
                exquisite: 85000,
                deluxe: 40000,
                exceptional: 15000,
                common: 2000
            };

            const labels = {
                legend: "Skin Legend",
                grand: "Skin Grand (Collector)",
                exquisite: "Skin Exquisite",
                deluxe: "Skin Deluxe",
                exceptional: "Skin Exceptional",
                common: "Skin Common"
            };

            const inputs = {
                legend: parseInt(document.getElementById('inLegend').value) || 0,
                grand: parseInt(document.getElementById('inGrand').value) || 0,
                exquisite: parseInt(document.getElementById('inExquisite').value) || 0,
                deluxe: parseInt(document.getElementById('inDeluxe').value) || 0,
                exceptional: parseInt(document.getElementById('inExceptional').value) || 0,
                common: parseInt(document.getElementById('inCommon').value) || 0
            };

            const emblemValue = parseInt(document.getElementById('emblemStatus').value);
            const wr = parseFloat(document.getElementById('wr').value) || 0;
            const loginMult = parseFloat(document.getElementById('loginType').value);

            let subtotal = 0;
            let invoiceHTML = "";

            for (let key in inputs) {
                if (inputs[key] > 0) {
                    let itemTotal = inputs[key] * PRICES[key];
                    subtotal += itemTotal;
                    invoiceHTML += `
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xs font-extrabold text-slate-200">${labels[key]}</p>
                                <p class="text-[10px] text-slate-500">${inputs[key]} Unit x Rp ${PRICES[key].toLocaleString()}</p>
                            </div>
                            <span class="text-xs font-bold text-slate-300">Rp ${itemTotal.toLocaleString()}</span>
                        </div>
                    `;
                }
            }

            if (subtotal === 0 && emblemValue === 0) {
                alert("Masukkan detail skin atau emblem!");
                return;
            }

            // Bagian Tambahan (Emblem & WR)
            let bonusWR = wr >= 70 ? 250000 : (wr >= 60 ? 100000 : 0);
            let extraHTML = "";
            
            if (emblemValue > 0) {
                extraHTML += `
                    <div class="flex justify-between text-[11px] text-orange-400 font-bold italic">
                        <span>Aset Emblem</span>
                        <span>+ Rp ${emblemValue.toLocaleString()}</span>
                    </div>
                `;
            }

            if (bonusWR > 0) {
                extraHTML += `
                    <div class="flex justify-between text-[11px] text-green-400 font-bold italic">
                        <span>Bonus High WR (${wr}%)</span>
                        <span>+ Rp ${bonusWR.toLocaleString()}</span>
                    </div>
                `;
            }

            let totalBeforeTax = subtotal + emblemValue + bonusWR;
            let finalPrice = totalBeforeTax * loginMult;

            // Render Potongan Keamanan
            if (loginMult < 1) {
                let pot = totalBeforeTax - finalPrice;
                document.getElementById('taxSection').classList.remove('hidden');
                document.getElementById('taxSection').innerText = `⚠️ POTONGAN KEAMANAN LOGIN: - Rp ${pot.toLocaleString()}`;
            } else {
                document.getElementById('taxSection').classList.add('hidden');
            }

            document.getElementById('invoiceContent').innerHTML = invoiceHTML;
            document.getElementById('bonusSection').innerHTML = extraHTML;
            document.getElementById('finalPrice').innerText = "Rp " + Math.round(finalPrice).toLocaleString('id-ID');
            document.getElementById('descStatus').innerText = loginMult === 1 ? "Monsep Polos" : "Minus Data";

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

<footer class="mt-16 text-center">
    <p class="text-slate-600 text-[10px] uppercase font-bold tracking-[0.3em]">
        &copy; 2026 Build by Rahmattulah &bull; Bondowoso Dev
    </p>
    <div class="mt-4 flex justify-center items-center gap-2">
        <span class="text-[10px] text-slate-500 uppercase">Total Pengunjung:</span>
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fusername-kamu.github.io%2Frepo-kamu&count_bg=%233B82F6&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=false" alt="Hits"/>
    </div>
</footer>
    
</body>
</html>
