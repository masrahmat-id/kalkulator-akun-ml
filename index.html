<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Account Calculator - Invoice Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .input-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold gradient-text tracking-tight">Kalkulator Akun MLBB</h1>
            <p class="text-slate-400 mt-2 font-medium">Estimasi Detail Berdasarkan Kategori Skin 2026</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 input-card p-6 rounded-3xl shadow-2xl space-y-6">
                <h3 class="text-lg font-bold border-b border-slate-700 pb-3 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> Input Data Akun
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs font-bold text-blue-400 uppercase">Skin Legend</label>
                        <input type="number" id="inLegend" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-yellow-500 uppercase">Skin Grand (Collector)</label>
                        <input type="number" id="inGrand" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-yellow-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-purple-400 uppercase">Skin Exquisite</label>
                        <input type="number" id="inExquisite" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-pink-400 uppercase">Skin Deluxe</label>
                        <input type="number" id="inDeluxe" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-pink-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-green-400 uppercase">Exceptional</label>
                        <input type="number" id="inExceptional" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Common / Normal</label>
                        <input type="number" id="inCommon" class="w-full bg-slate-900/80 p-3 rounded-xl mt-1 border border-slate-700 outline-none transition" placeholder="0">
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-700 grid grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Keamanan Login</label>
                        <select id="loginType" class="w-full bg-slate-900 p-3 rounded-xl mt-1 border border-slate-700 outline-none cursor-pointer">
                            <option value="1.0">Monsep Polos (No Minus)</option>
                            <option value="0.70">Monsep (Ada Minus)</option>
                            <option value="0.40">Log Pancingan / Nabrak</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Win Rate (%)</label>
                        <input type="number" id="wr" class="w-full bg-slate-900 p-3 rounded-xl mt-1 border border-slate-700 outline-none transition" placeholder="60">
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-extrabold py-4 rounded-2xl shadow-xl transition-all active:scale-95">
                    PROSES ESTIMASI HARGA
                </button>
            </div>

            <div id="resultBox" class="lg:col-span-5 hidden space-y-4">
                <div class="bg-gradient-to-br from-white to-slate-100 rounded-3xl p-6 text-slate-900 shadow-2xl border-b-8 border-blue-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Estimasi Harga Jual</p>
                    <h2 id="finalPrice" class="text-4xl font-black text-blue-800 my-1">Rp 0</h2>
                    <p id="descStatus" class="text-[11px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full inline-block"></p>
                </div>

                <div class="input-card rounded-3xl p-6 border-2 border-slate-700/50">
                    <h3 class="text-xs font-black text-slate-300 mb-4 uppercase tracking-widest flex justify-between">
                        <span>Rincian Item</span>
                        <span class="text-slate-500 text-[10px]">Harga Satuan</span>
                    </h3>
                    
                    <div id="invoiceContent" class="space-y-3 text-sm">
                        </div>

                    <div id="bonusSection" class="mt-4 pt-4 border-t border-slate-700 space-y-2">
                        </div>

                    <div id="taxSection" class="mt-2 text-red-400 text-xs font-bold italic">
                        </div>
                </div>

                <div class="flex gap-2">
                    <button onclick="window.print()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-[10px] font-black tracking-widest transition">SIMPAN PDF</button>
                    <button onclick="location.reload()" class="px-6 py-3 bg-red-900/20 text-red-400 hover:bg-red-900/40 rounded-2xl text-[10px] font-black transition">RESET</button>
                </div>
            </div>
        </div>

        <footer class="mt-16 text-center">
            <p class="text-slate-600 text-[10px] uppercase font-bold tracking-[0.3em]">MLBB Pricing Engine &bull; Rahmatulah Dev 2026</p>
        </footer>
    </div>

    <script>
        function calculate() {
            // KONFIGURASI HARGA SATUAN (RESALE VALUE)
            const PRICES = {
                legend: 350000,
                grand: 200000,
                exquisite: 80000,
                deluxe: 35000,
                exceptional: 15000,
                common: 2000
            };

            const labels = {
                legend: "Skin Legend",
                grand: "Skin Grand (Collector)",
                exquisite: "Skin Exquisite",
                deluxe: "Skin Deluxe",
                exceptional: "Skin Exceptional",
                common: "Skin Common"
            };

            // Ambil Input
            const inputs = {
                legend: parseInt(document.getElementById('inLegend').value) || 0,
                grand: parseInt(document.getElementById('inGrand').value) || 0,
                exquisite: parseInt(document.getElementById('inExquisite').value) || 0,
                deluxe: parseInt(document.getElementById('inDeluxe').value) || 0,
                exceptional: parseInt(document.getElementById('inExceptional').value) || 0,
                common: parseInt(document.getElementById('inCommon').value) || 0
            };

            const wr = parseFloat(document.getElementById('wr').value) || 0;
            const loginMult = parseFloat(document.getElementById('loginType').value);

            let subtotal = 0;
            let invoiceHTML = "";

            // Loop untuk membuat rincian baris
            for (let key in inputs) {
                if (inputs[key] > 0) {
                    let itemTotal = inputs[key] * PRICES[key];
                    subtotal += itemTotal;
                    
                    invoiceHTML += `
                        <div class="flex justify-between items-center bg-slate-800/30 p-2 rounded-lg">
                            <div>
                                <p class="text-[11px] font-bold text-slate-300">${labels[key]}</p>
                                <p class="text-[10px] text-slate-500">${inputs[key]} Unit × Rp ${PRICES[key].toLocaleString()}</p>
                            </div>
                            <span class="text-xs font-bold text-slate-200">Rp ${itemTotal.toLocaleString()}</span>
                        </div>
                    `;
                }
            }

            if (subtotal === 0) {
                alert("Harap masukkan setidaknya satu jumlah skin!");
                return;
            }

            // Hitung Bonus WR
            let bonusWR = 0;
            let bonusHTML = "";
            if (wr >= 70) bonusWR = 250000;
            else if (wr >= 60) bonusWR = 100000;

            if (bonusWR > 0) {
                bonusHTML = `
                    <div class="flex justify-between text-[11px] text-green-400 font-bold">
                        <span>Bonus High Win Rate (${wr}%)</span>
                        <span>+ Rp ${bonusWR.toLocaleString()}</span>
                    </div>
                `;
            }

            // Total Sebelum Potongan Login
            let beforeLogin = subtotal + bonusWR;
            let finalTotal = beforeLogin * loginMult;
            let taxHTML = "";

            if (loginMult < 1) {
                let lostValue = beforeLogin - finalTotal;
                taxHTML = `* Potongan Keamanan Login: - Rp ${lostValue.toLocaleString()} (${Math.round((1-loginMult)*100)}%)`;
            }

            // Tampilkan ke UI
            document.getElementById('invoiceContent').innerHTML = invoiceHTML;
            document.getElementById('bonusSection').innerHTML = bonusHTML;
            document.getElementById('taxSection').innerText = taxHTML;
            document.getElementById('finalPrice').innerText = "Rp " + Math.round(finalTotal).toLocaleString('id-ID');
            document.getElementById('descStatus').innerText = loginMult === 1 ? "STATUS: AKUN AMAN (FULL PRICE)" : "STATUS: AKUN BERISIKO (POTONGAN HARGA)";

            // Reveal Result
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
