<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Ultimate Calculator - Pro Asset Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .accent-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold accent-text">Kalkulator Akun MLBB v2.0</h1>
            <p class="text-slate-400 mt-2">Detail Skin, Hero, Emblem, & Aksesori Langka</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-7 space-y-6">
                
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-blue-400 font-bold mb-4 flex items-center gap-2">✨ Koleksi Skin (Update 2026)</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-xs font-bold">
                        <div><label>Legend</label><input type="number" id="inLegend" class="w-full p-2 rounded-lg mt-1" placeholder="0"></div>
                        <div><label>Grand (Collab)</label><input type="number" id="inGrand" class="w-full p-2 rounded-lg mt-1" placeholder="0"></div>
                        <div><label>Exquisite</label><input type="number" id="inExquisite" class="w-full p-2 rounded-lg mt-1" placeholder="0"></div>
                        <div><label>Deluxe</label><input type="number" id="inDeluxe" class="w-full p-2 rounded-lg mt-1" placeholder="0"></div>
                        <div><label>Exceptional</label><input type="number" id="inExceptional" class="w-full p-2 rounded-lg mt-1" placeholder="0"></div>
                        <div><label>Common</label><input type="number" id="inCommon" class="w-full p-2 rounded-lg mt-1" placeholder="0"></div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-green-400 font-bold mb-4 flex items-center gap-2">🛡️ Properti & Aksesori</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold">Total Hero</label>
                            <input type="number" id="inHero" class="w-full p-2 rounded-lg mt-1" placeholder="Max 125">
                        </div>
                        <div>
                            <label class="text-xs font-bold">Emblem Max (Jumlah)</label>
                            <input type="number" id="inEmblem" class="w-full p-2 rounded-lg mt-1" placeholder="0-9">
                        </div>
                        <div>
                            <label class="text-xs font-bold">Recall Langka (Tas-Tas/Fire Crown)</label>
                            <input type="number" id="inRecall" class="w-full p-2 rounded-lg mt-1" placeholder="Jumlah efek">
                        </div>
                        <div>
                            <label class="text-xs font-bold">Emote Langka (Exclusive)</label>
                            <input type="number" id="inEmote" class="w-full p-2 rounded-lg mt-1" placeholder="Jumlah emote">
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400">Login Type</label>
                        <select id="loginType" class="w-full p-2 rounded-lg mt-1">
                            <option value="1.0">Monsep Polos</option>
                            <option value="0.7">Monsep (Minus)</option>
                            <option value="0.4">Log Pancing/Nabrak</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400">Win Rate Total (%)</label>
                        <input type="number" id="wr" class="w-full p-2 rounded-lg mt-1" placeholder="60">
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black tracking-widest transition shadow-lg shadow-blue-900/20">HITUNG RINCIAN</button>
            </div>

            <div id="resultBox" class="lg:col-span-5 hidden">
                <div class="glass p-6 rounded-3xl sticky top-8 border-2 border-blue-500/30">
                    <div class="bg-blue-600 p-4 rounded-2xl mb-6 text-center">
                        <p class="text-[10px] font-bold uppercase tracking-widest opacity-80">Estimasi Harga Jual</p>
                        <h2 id="finalPrice" class="text-4xl font-black">Rp 0</h2>
                    </div>

                    <div class="space-y-4">
                        <h4 class="text-xs font-bold text-slate-500 uppercase">Breakdown Invoice:</h4>
                        <div id="invoiceList" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 text-sm">
                            </div>
                        <div id="taxSection" class="pt-4 border-t border-slate-700 text-xs text-red-400 italic"></div>
                    </div>

                    <div class="mt-6 grid grid-cols-2 gap-2">
                        <button onclick="window.print()" class="bg-slate-800 p-3 rounded-xl text-[10px] font-bold">SIMPAN DATA</button>
                        <button onclick="location.reload()" class="bg-red-900/20 text-red-400 p-3 rounded-xl text-[10px] font-bold">RESET</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function calculate() {
            // HARGA SATUAN (RESALE VALUE)
            const PRICES = {
                legend: 350000,
                grand: 200000,
                exquisite: 80000,
                deluxe: 35000,
                exceptional: 12000,
                common: 2000,
                hero: 1000,      // Harga per hero
                emblem: 15000,   // Harga per emblem max
                recall: 100000,  // Harga per recall langka (tas-tas/fire crown/epic)
                emote: 5000      // Harga per emote langka/exclusive
            };

            const labels = {
                legend: "Skin Legend", grand: "Skin Grand", exquisite: "Skin Exquisite",
                deluxe: "Skin Deluxe", exceptional: "Skin Exceptional", common: "Skin Common",
                hero: "Hero Collection", emblem: "Emblem Max", recall: "Recall Efek Langka", emote: "Exclusive Emote"
            };

            const vals = {
                legend: parseInt(document.getElementById('inLegend').value) || 0,
                grand: parseInt(document.getElementById('inGrand').value) || 0,
                exquisite: parseInt(document.getElementById('inExquisite').value) || 0,
                deluxe: parseInt(document.getElementById('inDeluxe').value) || 0,
                exceptional: parseInt(document.getElementById('inExceptional').value) || 0,
                common: parseInt(document.getElementById('inCommon').value) || 0,
                hero: parseInt(document.getElementById('inHero').value) || 0,
                emblem: parseInt(document.getElementById('inEmblem').value) || 0,
                recall: parseInt(document.getElementById('inRecall').value) || 0,
                emote: parseInt(document.getElementById('inEmote').value) || 0
            };

            let subtotal = 0;
            let listHTML = "";

            for (let key in vals) {
                if (vals[key] > 0) {
                    let cost = vals[key] * PRICES[key];
                    subtotal += cost;
                    listHTML += `
                        <div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5">
                            <span><b class="text-blue-400">${vals[key]}</b> <span class="text-[11px]">${labels[key]}</span></span>
                            <span class="font-bold">Rp ${cost.toLocaleString()}</span>
                        </div>
                    `;
                }
            }

            // Tambahan WR
            let wr = parseFloat(document.getElementById('wr').value) || 0;
            if (wr >= 65) {
                subtotal += 150000;
                listHTML += `<div class="flex justify-between text-green-400 p-2 text-[11px]"><span>Bonus High WR (${wr}%)</span><span>+Rp 150.000</span></div>`;
            }

            const loginMult = parseFloat(document.getElementById('loginType').value);
            const finalPrice = subtotal * loginMult;

            document.getElementById('invoiceList').innerHTML = listHTML;
            document.getElementById('finalPrice').innerText = "Rp " + Math.round(finalPrice).toLocaleString('id-ID');
            
            if(loginMult < 1) {
                document.getElementById('taxSection').innerText = `* Potongan Keamanan: -Rp ${(subtotal - finalPrice).toLocaleString()}`;
            } else {
                document.getElementById('taxSection').innerText = "";
            }

            document.getElementById('resultBox').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
